<!DOCTYPE html>
<html lang="PT-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Manga-Zone</title>
</head>

<body>

    <div class="container">

        <div class="texto">

            <h1>Mangá-Zone</h1>

            <p>
                Mangá-Zone é um projeto de plataforma online criada para fãs de mangá.
                A ideia é reunir capítulos em um só lugar e facilitar a leitura,
                permitindo que qualquer pessoa des cubra novas histórias rapidamente.
            </p>

            <button>Acessar</button>

            <div class="info-extra">

                <div class="redes">

                    <div class="rede">
                        <i class="fa-brands fa-instagram"></i>
                        <span>@mangazone</span>
                    </div>

                    <div class="rede">
                        <i class="fa-brands fa-tiktok"></i>
                        <span>@mangazone</span>
                    </div>

                    <div class="rede">
                        <i class="fa-brands fa-twitter"></i>
                        <span>@mangazone</span>
                    </div>

                </div>

                <div class="qrcode">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Link_pra_pagina_principal_da_Wikipedia-PT_em_codigo_QR_b.svg" alt="QR Code">
                    <p>mangazone.com</p>
                </div>

            </div>



        </div>

        <img class="capa" src="https://m.media-amazon.com/images/I/81TmHlRleJL._SY425_.jpg">

    </div>



</body>

</html>
